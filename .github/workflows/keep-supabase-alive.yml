name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 UTC every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ ERRO: Secret SUPABASE_URL não está configurada!"
            echo "Configure em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "❌ ERRO: Secret SUPABASE_ANON_KEY não está configurada!"
            echo "Configure em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Secrets configuradas corretamente."

      - name: Ping Supabase Database
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=30
          SUCCESS=false

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Tentativa $attempt de $MAX_RETRIES..."

            response=$(curl -s -w "\n%{http_code}" \
              --max-time 30 \
              --connect-timeout 10 \
              -X GET \
              "${{ secrets.SUPABASE_URL }}/rest/v1/?select=count" \
              -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

            curl_exit=$?

            if [ $curl_exit -ne 0 ]; then
              echo "⚠️ curl falhou com código de saída $curl_exit"
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "Aguardando ${RETRY_DELAY}s antes de tentar novamente..."
                sleep $RETRY_DELAY
                continue
              fi
              echo "❌ FALHA: Não foi possível conectar ao Supabase após $MAX_RETRIES tentativas!"
              echo "Possíveis causas:"
              echo "  - Projeto Supabase está pausado"
              echo "  - URL incorreta"
              echo "  - Problema de rede"
              exit 1
            fi

            body=$(echo "$response" | head -n -1)
            http_code=$(echo "$response" | tail -n1)

            echo "HTTP Status: $http_code"
            echo "Response body: $body"

            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 300 ] 2>/dev/null; then
              echo "✅ Ping bem-sucedido! HTTP $http_code"
              echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              SUCCESS=true
              break
            fi

            if [ "$http_code" -eq 0 ] 2>/dev/null || ! [ "$http_code" -eq "$http_code" ] 2>/dev/null; then
              echo "⚠️ Resposta inválida recebida"
            else
              echo "⚠️ HTTP $http_code - Resposta não-2xx"
            fi

            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "Aguardando ${RETRY_DELAY}s antes de tentar novamente..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo ""
            echo "❌ FALHA: Ping falhou após $MAX_RETRIES tentativas!"
            echo "🔴 O projeto Supabase pode estar pausado ou inacessível."
            echo "Ações necessárias:"
            echo "  1. Verifique o dashboard: https://supabase.com/dashboard"
            echo "  2. Se pausado, restaure o projeto manualmente"
            echo "  3. Verifique se os secrets estão corretos"
            exit 1
          fi
